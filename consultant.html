<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 인테리어 컨설턴트 | 스몰테이블</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px 24px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
        header a { color: #667eea; text-decoration: none; font-size: 1.2rem; }
        header h1 { font-size: 1.3rem; }
        .container { max-width: 700px; width: 100%; margin: 0 auto; padding: 24px; flex: 1; display: flex; flex-direction: column; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .question { font-size: 1.2rem; margin-bottom: 24px; line-height: 1.6; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .options button { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 16px 20px; border-radius: 12px; font-size: 1rem; cursor: pointer; text-align: left; transition: all 0.2s; }
        .options button:hover { border-color: #667eea; background: #1a1a2e; }
        .options button.selected { border-color: #667eea; background: #1a1a3e; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #999; margin-bottom: 8px; font-size: 0.9rem; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 14px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 1rem; }
        .input-group textarea { min-height: 100px; resize: vertical; font-family: inherit; }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus { outline: none; border-color: #667eea; }
        .nav-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .btn-next { padding: 14px 32px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn-next:hover { opacity: 0.85; }
        .btn-back { padding: 14px 24px; background: transparent; border: 1px solid #444; color: #999; border-radius: 10px; cursor: pointer; font-size: 1rem; }
        .progress { display: flex; gap: 8px; margin-bottom: 30px; }
        .progress-dot { width: 40px; height: 4px; background: #333; border-radius: 2px; transition: background 0.3s; }
        .progress-dot.done { background: #667eea; }
        .result-card { background: #111; border: 1px solid #333; border-radius: 16px; padding: 32px; margin-top: 20px; }
        .result-card h2 { font-size: 1.5rem; margin-bottom: 20px; color: #667eea; }
        .section { margin-bottom: 24px; }
        .section h3 { font-size: 1.1rem; margin-bottom: 12px; color: #ccc; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .section p { color: #aaa; line-height: 1.8; font-size: 0.95rem; }
        .tag { display: inline-block; padding: 6px 14px; background: #1a1a3e; border: 1px solid #667eea40; border-radius: 20px; color: #667eea; font-size: 0.85rem; margin: 4px 4px 4px 0; }
        .color-swatch { display: inline-block; width: 32px; height: 32px; border-radius: 8px; margin: 4px; border: 2px solid #333; vertical-align: middle; }
        .tip-box { background: #1a1a1a; border-left: 3px solid #667eea; padding: 16px; border-radius: 0 10px 10px 0; margin: 12px 0; color: #bbb; font-size: 0.9rem; line-height: 1.7; }
        .cta { margin-top: 24px; text-align: center; }
        .cta a { display: inline-block; padding: 16px 40px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; text-decoration: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .checkbox-group label { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .checkbox-group label:hover { border-color: #667eea; }
        .checkbox-group input[type="checkbox"] { accent-color: #667eea; }
        .checkbox-group label.checked { border-color: #667eea; background: #1a1a3e; }
    </style>
</head>
<body>
    <header>
        <a href="index.html">← 홈</a>
        <h1>🎨 AI 인테리어 컨설턴트</h1>
    </header>
    <div class="container">
        <div class="progress" id="progress"></div>

        <!-- Step 1: 공간 유형 -->
        <div class="step active" id="step1">
            <div class="question">어떤 공간을 꾸미려고 하시나요?</div>
            <div class="options" id="spaceType">
                <button onclick="selectOption(this,'spaceType','아파트 거실/주방')">🏢 아파트 거실 / 주방</button>
                <button onclick="selectOption(this,'spaceType','아파트 침실')">🛏 아파트 침실</button>
                <button onclick="selectOption(this,'spaceType','원룸/오피스텔')">🏬 원룸 / 오피스텔</button>
                <button onclick="selectOption(this,'spaceType','상가/카페')">☕ 상가 / 카페</button>
                <button onclick="selectOption(this,'spaceType','사무실')">💼 사무실</button>
            </div>
        </div>

        <!-- Step 2: 선호 스타일 -->
        <div class="step" id="step2">
            <div class="question">선호하시는 인테리어 스타일은?</div>
            <div class="options" id="styleType">
                <button onclick="selectOption(this,'styleType','미니멀 모던')">⬜ 미니멀 모던 — 깔끔하고 군더더기 없는</button>
                <button onclick="selectOption(this,'styleType','내추럴 우드')">🪵 내추럴 우드 — 따뜻한 원목 느낌</button>
                <button onclick="selectOption(this,'styleType','북유럽')">🇸🇪 북유럽 — 밝고 아늑한 스칸디나비안</button>
                <button onclick="selectOption(this,'styleType','모던 클래식')">🏛 모던 클래식 — 고급스러운 클래식 감성</button>
                <button onclick="selectOption(this,'styleType','인더스트리얼')">🏭 인더스트리얼 — 노출 콘크리트, 철재</button>
                <button onclick="selectOption(this,'styleType','한국 전통 모던')">🏯 한국 전통 모던 — 한옥 감성 + 현대적</button>
            </div>
        </div>

        <!-- Step 3: 예산 -->
        <div class="step" id="step3">
            <div class="question">인테리어 예산은 어느 정도인가요?</div>
            <div class="options" id="budget">
                <button onclick="selectOption(this,'budget','1천만원 이하')">💰 1천만원 이하 — 포인트 변경 위주</button>
                <button onclick="selectOption(this,'budget','1천~3천만원')">💰💰 1천~3천만원 — 부분 리모델링</button>
                <button onclick="selectOption(this,'budget','3천~7천만원')">💰💰💰 3천~7천만원 — 중간 규모 올수리</button>
                <button onclick="selectOption(this,'budget','7천만원~1.5억')">💎 7천만원~1.5억 — 프리미엄 올수리</button>
                <button onclick="selectOption(this,'budget','1.5억 이상')">👑 1.5억 이상 — 하이엔드 리모델링</button>
            </div>
        </div>

        <!-- Step 4: 가구원 -->
        <div class="step" id="step4">
            <div class="question">함께 사시는 분들은 누구인가요?</div>
            <div class="options" id="family">
                <button onclick="selectOption(this,'family','1인 가구')">🧑 1인 가구</button>
                <button onclick="selectOption(this,'family','신혼부부')">💑 신혼부부</button>
                <button onclick="selectOption(this,'family','영유아 자녀 가정')">👶 영유아 자녀 있는 가정</button>
                <button onclick="selectOption(this,'family','초등 이상 자녀 가정')">👨‍👩‍👧‍👦 초등학생 이상 자녀 가정</button>
                <button onclick="selectOption(this,'family','반려동물 가정')">🐶 반려동물과 함께</button>
            </div>
        </div>

        <!-- Step 5: 중요 요소 -->
        <div class="step" id="step5">
            <div class="question">인테리어에서 가장 중요한 것은? (복수 선택 가능)</div>
            <div class="checkbox-group" id="priorities">
                <label><input type="checkbox" value="수납" onchange="toggleCheck(this)"> 🗄 수납 공간</label>
                <label><input type="checkbox" value="채광" onchange="toggleCheck(this)"> ☀️ 자연 채광</label>
                <label><input type="checkbox" value="동선" onchange="toggleCheck(this)"> 🚶 생활 동선</label>
                <label><input type="checkbox" value="가성비" onchange="toggleCheck(this)"> 💵 가성비</label>
                <label><input type="checkbox" value="디자인" onchange="toggleCheck(this)"> 🎨 디자인 감성</label>
                <label><input type="checkbox" value="내구성" onchange="toggleCheck(this)"> 🛡 내구성/관리</label>
                <label><input type="checkbox" value="방음" onchange="toggleCheck(this)"> 🔇 방음</label>
                <label><input type="checkbox" value="친환경" onchange="toggleCheck(this)"> 🌿 친환경 자재</label>
            </div>
            <div class="nav-buttons">
                <button class="btn-back" onclick="goStep(4)">← 이전</button>
                <button class="btn-next" onclick="generateConsult()">컨설팅 결과 보기 →</button>
            </div>
        </div>

        <!-- Step 6: 추가 요청 (선택) -->
        <div class="step" id="step6">
            <div class="question">추가로 전달하고 싶은 내용이 있나요? (선택)</div>
            <div class="input-group">
                <textarea id="extraNote" placeholder="예: 신발이 많아서 현관 수납이 중요해요, 재택근무 공간이 필요해요..."></textarea>
            </div>
            <div class="nav-buttons">
                <button class="btn-back" onclick="goStep(5)">← 이전</button>
                <button class="btn-next" onclick="generateConsult()">컨설팅 결과 보기 →</button>
            </div>
        </div>

        <!-- Result -->
        <div class="step" id="result"></div>
    </div>

    <script>
        const data = {};
        const totalSteps = 5;
        let currentStep = 1;

        function updateProgress() {
            const el = document.getElementById('progress');
            el.innerHTML = '';
            for (let i = 1; i <= totalSteps; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot' + (i <= currentStep ? ' done' : '');
                el.appendChild(dot);
            }
        }
        updateProgress();

        function selectOption(btn, key, value) {
            data[key] = value;
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            setTimeout(() => goStep(currentStep + 1), 300);
        }

        function toggleCheck(cb) {
            cb.closest('label').classList.toggle('checked', cb.checked);
        }

        function goStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            const target = document.getElementById('step' + n);
            if (target) { target.classList.add('active'); currentStep = n; }
            updateProgress();
        }

        // Style data

        const familyTips = {
            '1인 가구': '공간 효율을 극대화하세요. 접이식 가구, 멀티 기능 가구를 활용하면 좁은 공간도 넓게 쓸 수 있습니다.',

        const budgetGuide = {
            '1천만원 이하': { level: '포인트 체인지', detail: '도배, 장판 교체, 조명 변경, 페인트 작업 정도가 가능합니다. 포인트 벽지나 액센트 월로 분위기를 바꿔보세요.' },
            '1천~3천만원': { level: '부분 리모델링', detail: '주방 또는 욕실 중 한 곳 리모델링 + 도배/마루 교체가 가능합니다. 가장 많이 사용하는 공간에 집중 투자하세요.' },
            '3천~7천만원': { level: '중급 올수리', detail: '전체 도배/마루 + 주방/욕실 리모델링이 가능합니다. 국산 중급 자재로 깔끔한 올수리를 할 수 있는 예산입니다.' },
            '7천만원~1.5억': { level: '프리미엄 올수리', detail: '구조 변경 포함 전체 리모델링이 가능합니다. 수입 자재, 맞춤 가구, 시스템 수납 등 디테일한 시공까지 가능합니다.' },
            '1.5억 이상': { level: '하이엔드 리모델링', detail: '최고급 수입 자재, 맞춤 제작 가구, 스마트홈 시스템까지 원하시는 모든 것을 구현할 수 있습니다.' }
        };

        function generateConsult() {
            const space = data.spaceType || '아파트 거실/주방';
            const style = data.styleType || '미니멀 모던';
            const budget = data.budget || '3천~7천만원';
            const family = data.family || '1인 가구';
            const note = document.getElementById('extraNote')?.value || '';
            
            const priorities = [];
            document.querySelectorAll('#priorities input:checked').forEach(cb => priorities.push(cb.value));

            const sd = styleData[style] || styleData['미니멀 모던'];
            const bg = budgetGuide[budget] || budgetGuide['3천~7천만원'];
            const ft = familyTips[family] || '';

            let colorSwatches = sd.colors.map(c => `<span class="color-swatch" style="background:${c}" title="${c}"></span>`).join('');
            let materialTags = sd.materials.map(m => `<span class="tag">${m}</span>`).join('');
            let furnitureTags = sd.furniture.map(f => `<span class="tag">${f}</span>`).join('');
            let priorityTags = priorities.length > 0 ? priorities.map(p => `<span class="tag">${p}</span>`).join('') : '<span class="tag">전체 균형</span>';
            let tipsList = sd.tips.map(t => `• ${t}`).join('<br>');

            let html = `
                <div class="result-card">
                    <h2>🎨 AI 인테리어 컨설팅 리포트</h2>
                    
                    <div class="section">
                        <h3>📋 입력 정보</h3>
                        <p><strong>공간:</strong> ${space} &nbsp;|&nbsp; <strong>스타일:</strong> ${style} &nbsp;|&nbsp; <strong>예산:</strong> ${budget}<br>
                        <strong>가구원:</strong> ${family} &nbsp;|&nbsp; <strong>중점 요소:</strong> ${priorityTags}</p>
                    </div>

                    <div class="section">
                        <h3>✨ ${style} 스타일 가이드</h3>
                        <p>${sd.desc}</p>
                    </div>

                    <div class="section">
                        <h3>🎨 추천 컬러 팔레트</h3>
                        <p>${colorSwatches}</p>
                    </div>

                    <div class="section">
                        <h3>🪵 추천 마감재</h3>
                        <p>${materialTags}</p>
                    </div>

                    <div class="section">
                        <h3>🛋 추천 가구/소품</h3>
                        <p>${furnitureTags}</p>
                    </div>

                    <div class="section">
                        <h3>💡 디자인 팁</h3>
                        <div class="tip-box">${tipsList}</div>
                    </div>

                    <div class="section">
                        <h3>💰 예산 가이드 — ${bg.level}</h3>
                        <div class="tip-box">${bg.detail}</div>
                    </div>

                    <div class="section">
                        <h3>👨‍👩‍👧 ${family} 맞춤 조언</h3>
                        <div class="tip-box">${ft}</div>
                    </div>
                    ${note ? `<div class="section"><h3>📝 추가 참고</h3><div class="tip-box">말씀하신 "${note}" — 이 부분은 현장 상담 시 디자이너가 반영하여 맞춤 제안 드리겠습니다.</div></div>` : ''}
                </div>
                <div style="margin-top:20px;padding:16px;background:#1a1a1a;border-radius:10px;color:#888;font-size:0.85rem;line-height:1.6;">
                    ⚠️ 본 컨설팅은 AI가 일반적인 인테리어 트렌드와 데이터를 기반으로 제안한 <strong>참고용 가이드</strong>입니다.<br>
                    실제 공간의 구조, 채광, 기존 마감 상태에 따라 최적의 방향이 달라질 수 있습니다.<br>
                    맞춤 디자인 상담은 스몰테이블디자인그룹에 문의해 주세요.
                </div>
                <div class="cta">
                    <a href="https://open.kakao.com/o/s7h6q4Xf" target="_blank">📞 무료 디자인 상담 신청</a>
                </div>
            `;

            document.getElementById('result').innerHTML = html;
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
