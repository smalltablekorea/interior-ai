<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Material Recommender | SmallTable</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 20px 24px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
        header a { color: #667eea; text-decoration: none; font-size: 1.2rem; }
        header h1 { font-size: 1.3rem; }
        .container { max-width: 800px; width: 100%; margin: 0 auto; padding: 24px; flex: 1; }
        .step { display: none; animation: fadeIn 0.3s; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .question { font-size: 1.2rem; margin-bottom: 24px; line-height: 1.6; }
        .progress { display: flex; gap: 8px; margin-bottom: 30px; }
        .progress-dot { width: 60px; height: 4px; background: #333; border-radius: 2px; transition: background 0.3s; }
        .progress-dot.done { background: #667eea; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .category-card { background: #1a1a1a; border: 1px solid #333; border-radius: 14px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .category-card:hover { border-color: #667eea; transform: translateY(-2px); }
        .category-card.selected { border-color: #667eea; background: #1a1a3e; }
        .category-card .icon { font-size: 2rem; margin-bottom: 10px; }
        .category-card .label { font-weight: 600; font-size: 0.95rem; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .options button { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 16px 20px; border-radius: 12px; font-size: 1rem; cursor: pointer; text-align: left; transition: all 0.2s; }
        .options button:hover { border-color: #667eea; background: #1a1a2e; }
        .options button.selected { border-color: #667eea; background: #1a1a3e; }
        .nav-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .btn-next { padding: 14px 32px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-back { padding: 14px 24px; background: transparent; border: 1px solid #444; color: #999; border-radius: 10px; cursor: pointer; font-size: 1rem; }
        .material-results { display: flex; flex-direction: column; gap: 20px; }
        .material-card { background: #111; border: 1px solid #2a2a2a; border-radius: 16px; padding: 24px; transition: border-color 0.2s; }
        .material-card:hover { border-color: #444; }
        .material-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .material-name { font-size: 1.2rem; font-weight: 700; }
        .material-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-best { background: #1a3a1a; color: #4ade80; border: 1px solid #2a5a2a; }
        .badge-premium { background: #3a1a3a; color: #c084fc; border: 1px solid #5a2a5a; }
        .badge-value { background: #1a2a3a; color: #60a5fa; border: 1px solid #2a3a5a; }
        .material-specs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .spec { background: #1a1a1a; padding: 12px; border-radius: 8px; }
        .spec-label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
        .spec-value { font-weight: 600; font-size: 0.95rem; }
        .material-desc { color: #999; font-size: 0.9rem; line-height: 1.6; }
        .material-pros { margin-top: 12px; }
        .material-pros span { display: inline-block; background: #1a2a1a; color: #6ee7b7; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; margin: 3px 4px 3px 0; }
        .material-cons span { display: inline-block; background: #2a1a1a; color: #fca5a5; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; margin: 3px 4px 3px 0; }
        .summary-box { background: #111; border: 2px solid #667eea; border-radius: 16px; padding: 28px; margin-top: 24px; }
        .summary-box h3 { color: #667eea; margin-bottom: 16px; font-size: 1.2rem; }
        .cta { margin-top: 28px; text-align: center; }
        .cta a { display: inline-block; padding: 16px 40px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; text-decoration: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; }
        .disclaimer { margin-top: 20px; padding: 16px; background: #1a1a1a; border-radius: 10px; color: #888; font-size: 0.85rem; line-height: 1.6; }
    </style>
</head>
<body>
    <header>
        <a href="index.html">&larr; Home</a>
        <h1>🪵 AI Material Recommender</h1>
    </header>
    <div class="container">
        <div class="progress" id="progress"></div>

        <!-- Step 1: Category -->
        <div class="step active" id="step1">
            <div class="question">What type of material are you looking for?</div>
            <div class="category-grid" id="categories">
                <div class="category-card" onclick="selectCategory(this, 'Flooring')"><div class="icon">🪵</div><div class="label">Flooring</div></div>
                <div class="category-card" onclick="selectCategory(this, 'Tile')"><div class="icon">🟫</div><div class="label">Tile</div></div>
                <div class="category-card" onclick="selectCategory(this, 'Doors')"><div class="icon">🚪</div><div class="label">Doors</div></div>
                <div class="category-card" onclick="selectCategory(this, 'Wallpaper')"><div class="icon">📜</div><div class="label">Wallpaper</div></div>
                <div class="category-card" onclick="selectCategory(this, 'Countertop')"><div class="icon">🍳</div><div class="label">Countertop</div></div>
                <div class="category-card" onclick="selectCategory(this, 'Lighting')"><div class="icon">💡</div><div class="label">Lighting</div></div>
                <div class="category-card" onclick="selectCategory(this, 'Bathroom')"><div class="icon">🚿</div><div class="label">Bathroom</div></div>
                <div class="category-card" onclick="selectCategory(this, 'Trim')"><div class="icon">📐</div><div class="label">Trim / Molding</div></div>
            </div>
        </div>

        <!-- Step 2: Style -->
        <div class="step" id="step2">
            <div class="question">What vibe are you going for?</div>
            <div class="options" id="styleOptions">
                <button onclick="selectOpt(this, 'style', 'Modern')">⬜ Modern / Minimal</button>
                <button onclick="selectOpt(this, 'style', 'Natural')">🪵 Natural / Warm Wood</button>
                <button onclick="selectOpt(this, 'style', 'Classic')">🏛 Classic / Luxe</button>
                <button onclick="selectOpt(this, 'style', 'Industrial')">🏭 Industrial</button>
            </div>
        </div>

        <!-- Step 3: Budget -->
        <div class="step" id="step3">
            <div class="question">What's your budget level?</div>
            <div class="options" id="budgetOptions">
                <button onclick="selectOpt(this, 'budget', 'Budget')">💵 Budget-Friendly &mdash; Best value for money</button>
                <button onclick="selectOpt(this, 'budget', 'Mid-Range')">💎 Mid-Range &mdash; Quality meets affordability</button>
                <button onclick="selectOpt(this, 'budget', 'Premium')">👑 Premium &mdash; Top-tier materials</button>
            </div>
        </div>

        <!-- Result -->
        <div class="step" id="result"></div>
    </div>

    <script>
        const data = {};
        let currentStep = 1;

        const materialDB = {
            'Flooring': {
                'Modern': {
                    'Budget': [
                        { name: 'Laminate Wood Flooring', price: '$2 – $5 / sqft', durability: '★★★☆', design: '★★★☆', badge: 'value', desc: 'Affordable laminate with realistic wood-look finish. Easy to install and maintain.', pros: ['Budget-friendly', 'Easy install', 'Low maintenance'], cons: ['Not waterproof', 'Can feel hollow'] },
                        { name: 'Vinyl Plank (LVP)', price: '$3 – $6 / sqft', durability: '★★★★', design: '★★★☆', badge: 'best', desc: 'Waterproof vinyl plank flooring. Perfect for kitchens, bathrooms, and high-traffic areas.', pros: ['100% waterproof', 'Scratch resistant', 'DIY-friendly'], cons: ['Not natural feel', 'Off-gassing concerns'] }
                    ],
                    'Mid-Range': [
                        { name: 'Engineered Hardwood (Oak)', price: '$6 – $12 / sqft', durability: '★★★★', design: '★★★★★', badge: 'best', desc: 'Multi-layer engineered oak. Real wood surface with dimensional stability.', pros: ['Real wood look', 'Stable in humidity', 'Can be refinished'], cons: ['Water-sensitive', 'Higher cost'] },
                        { name: 'SPC Rigid Core', price: '$4 – $8 / sqft', durability: '★★★★★', design: '★★★★', badge: 'value', desc: 'Stone Polymer Composite core with waterproof performance. Great for underfloor heating.', pros: ['Fully waterproof', 'Dent resistant', 'Heat compatible'], cons: ['Cold underfoot'] }
                    ],
                    'Premium': [
                        { name: 'European White Oak Hardwood', price: '$12 – $20 / sqft', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Wide-plank European white oak. Timeless beauty that deepens with age.', pros: ['Natural material', 'Ages beautifully', 'Adds home value'], cons: ['Needs maintenance', 'High price'] },
                        { name: 'Herringbone Parquet', price: '$15 – $25 / sqft', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Classic herringbone pattern in solid or engineered hardwood. Makes any room a statement.', pros: ['Iconic pattern', 'Premium feel', 'Investment-grade'], cons: ['Complex installation', 'Expensive'] }
                    ]
                },
                'Natural': {
                    'Budget': [
                        { name: 'Light Oak Laminate', price: '$2 – $4 / sqft', durability: '★★★☆', design: '★★★★', badge: 'best', desc: 'Light oak tone laminate for bright, natural-looking spaces.', pros: ['Bright feel', 'Affordable', 'Easy care'], cons: ['Not real wood'] },
                        { name: 'Bamboo Flooring', price: '$3 – $6 / sqft', durability: '★★★★', design: '★★★☆', badge: 'value', desc: 'Eco-friendly bamboo flooring. Sustainable and naturally warm.', pros: ['Eco-friendly', 'Naturally warm', 'Hard surface'], cons: ['Moisture sensitive'] }
                    ],
                    'Mid-Range': [
                        { name: 'Engineered Walnut', price: '$8 – $14 / sqft', durability: '★★★★', design: '★★★★★', badge: 'best', desc: 'Rich walnut-toned engineered wood. Warm, inviting ambiance.', pros: ['Deep warm tone', 'Real wood', 'Durable surface'], cons: ['Shows scratches'] },
                        { name: 'Reclaimed Wood Look', price: '$6 – $10 / sqft', durability: '★★★★', design: '★★★★', badge: 'value', desc: 'Engineered planks with a reclaimed wood aesthetic. Rustic charm, modern performance.', pros: ['Unique character', 'Eco-conscious', 'Trendy'], cons: ['Variable tones'] }
                    ],
                    'Premium': [
                        { name: 'Wide-Plank Walnut Hardwood', price: '$14 – $22 / sqft', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Solid wide-plank walnut. Deep chocolate tones create luxurious natural warmth.', pros: ['Stunning grain', 'Premium quality', 'Long lifespan'], cons: ['Very expensive'] },
                        { name: 'Hand-Scraped Acacia', price: '$12 – $18 / sqft', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Hand-scraped acacia hardwood. Every plank is uniquely textured.', pros: ['One-of-a-kind texture', 'Extremely hard', 'Exotic beauty'], cons: ['Installation complexity'] }
                    ]
                },
                'Classic': {
                    'Budget': [{ name: 'Marble-Look Laminate', price: '$3 – $6 / sqft', durability: '★★★☆', design: '★★★★', badge: 'value', desc: 'Marble-patterned laminate for a classic look at a fraction of the cost.', pros: ['Classic look', 'Budget-friendly'], cons: ['Not real stone'] }],
                    'Mid-Range': [{ name: 'Marble-Look SPC Tile', price: '$6 – $10 / sqft', durability: '★★★★', design: '★★★★', badge: 'best', desc: 'SPC tiles with realistic marble veining. Waterproof with a luxury feel.', pros: ['Marble aesthetic', 'Waterproof', 'Easy care'], cons: ['Synthetic material'] }],
                    'Premium': [{ name: 'Italian Marble Tile', price: '$20 – $40 / sqft', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Genuine Italian marble flooring. The ultimate in classic luxury.', pros: ['Natural stone', 'Timeless luxury'], cons: ['Very expensive', 'Requires sealing'] }]
                },
                'Industrial': {
                    'Budget': [{ name: 'Concrete-Look Vinyl', price: '$2 – $4 / sqft', durability: '★★★☆', design: '★★★☆', badge: 'value', desc: 'Vinyl sheet with polished concrete appearance. Easy industrial look.', pros: ['Affordable', 'Quick install'], cons: ['Not durable long-term'] }],
                    'Mid-Range': [{ name: 'Epoxy Floor Coating', price: '$6 – $12 / sqft', durability: '★★★★', design: '★★★★', badge: 'best', desc: 'Epoxy resin floor finish. Seamless, durable, and customizable colors.', pros: ['Seamless finish', 'Very durable', 'Custom colors'], cons: ['Professional install needed'] }],
                    'Premium': [{ name: 'Microcement Floor', price: '$15 – $30 / sqft', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Micro-cement finish for seamless, ultra-modern concrete floors.', pros: ['No seams', 'Ultra-modern', 'Unique texture'], cons: ['Specialist required', 'High cost'] }]
                }
            },
            'Tile': {
                'Modern': {
                    'Budget': [{ name: 'Porcelain 24x24 (Domestic)', price: '$3 – $6 / sqft', durability: '★★★★', design: '★★★☆', badge: 'value', desc: 'Standard porcelain tile. Durable and versatile for bathrooms and entryways.', pros: ['Durable', 'Water-resistant', 'Affordable'], cons: ['Limited designs'] }],
                    'Mid-Range': [{ name: 'Spanish Matte Porcelain', price: '$8 – $14 / sqft', durability: '★★★★★', design: '★★★★', badge: 'best', desc: 'Imported matte-finish porcelain from Spain. The go-to for modern interiors.', pros: ['Matte texture', 'Premium import', 'Stain-resistant'], cons: ['Higher price'] }],
                    'Premium': [{ name: 'Italian Large-Format Slab', price: '$15 – $30 / sqft', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: '48x96 inch Italian slabs. Minimal grout lines for a seamless luxury look.', pros: ['Huge format', 'Minimal seams', 'Stunning effect'], cons: ['Complex install', 'Very expensive'] }]
                },
                'Natural': {
                    'Budget': [{ name: 'Wood-Look Porcelain', price: '$4 – $7 / sqft', durability: '★★★★', design: '★★★★', badge: 'best', desc: 'Porcelain tiles that look like real wood. Perfect for wet areas where you want warmth.', pros: ['Wood aesthetic', 'Waterproof', 'Durable'], cons: ['Cold underfoot'] }],
                    'Mid-Range': [{ name: 'Natural Stone-Look Tile', price: '$8 – $14 / sqft', durability: '★★★★', design: '★★★★', badge: 'best', desc: 'Tiles mimicking natural stone texture. Organic feel without stone maintenance.', pros: ['Natural feel', 'Low maintenance'], cons: ['Synthetic'] }],
                    'Premium': [{ name: 'Travertine (Natural)', price: '$12 – $22 / sqft', durability: '★★★★', design: '★★★★★', badge: 'premium', desc: 'Genuine travertine stone tile. Natural pitting and variation for authentic beauty.', pros: ['Natural material', 'Unique patterns'], cons: ['Requires sealing'] }]
                },
                'Classic': {
                    'Budget': [{ name: 'Marble-Look Porcelain', price: '$4 – $8 / sqft', durability: '★★★★', design: '★★★☆', badge: 'value', desc: 'Affordable porcelain with marble veining. Classic elegance on a budget.', pros: ['Marble look', 'Budget-friendly'], cons: ['Not real marble'] }],
                    'Mid-Range': [{ name: 'Calacatta Porcelain', price: '$10 – $18 / sqft', durability: '★★★★★', design: '★★★★★', badge: 'best', desc: 'High-end porcelain with Calacatta marble pattern. Luxurious without the maintenance.', pros: ['Luxury pattern', 'Easy care'], cons: ['Synthetic'] }],
                    'Premium': [{ name: 'Italian Carrara Marble', price: '$20 – $45 / sqft', durability: '★★★★', design: '★★★★★', badge: 'premium', desc: 'Genuine Carrara marble from Italy. Timeless elegance for discerning homeowners.', pros: ['Authentic luxury', 'Timeless'], cons: ['High maintenance', 'Very expensive'] }]
                },
                'Industrial': {
                    'Budget': [{ name: 'Cement-Look Porcelain', price: '$3 – $6 / sqft', durability: '★★★★', design: '★★★☆', badge: 'value', desc: 'Concrete-inspired porcelain tile. Industrial aesthetic made easy.', pros: ['Industrial vibe', 'Affordable'], cons: ['Limited variation'] }],
                    'Mid-Range': [{ name: 'Terrazzo Tile', price: '$8 – $14 / sqft', durability: '★★★★★', design: '★★★★', badge: 'best', desc: 'Terrazzo-pattern tiles. Retro-modern fusion that works in any industrial space.', pros: ['Unique pattern', 'Very durable'], cons: ['Polarizing design'] }],
                    'Premium': [{ name: 'Handmade Terracotta', price: '$12 – $20 / sqft', durability: '★★★★', design: '★★★★★', badge: 'premium', desc: 'Artisan-made terracotta tiles. Each piece has unique character and warmth.', pros: ['Handcrafted', 'Unique'], cons: ['Requires sealing'] }]
                }
            }
        };

        // Fallback materials for categories not fully defined
        function getMaterials(cat, style, budget) {
            if (materialDB[cat] && materialDB[cat][style] && materialDB[cat][style][budget]) {
                return materialDB[cat][style][budget];
            }
            const fallbacks = {
                'Doors': [
                    { name: 'Hollow-Core Interior Door', price: '$80 – $150 each', durability: '★★★☆', design: '★★★☆', badge: 'value', desc: 'Standard hollow-core doors. Lightweight and budget-friendly.', pros: ['Affordable', 'Light weight'], cons: ['Feels cheap', 'Poor sound isolation'] },
                    { name: 'Solid-Core MDF Door', price: '$200 – $400 each', durability: '★★★★', design: '★★★★', badge: 'best', desc: 'Solid-core MDF door with various finish options. Great balance of quality and price.', pros: ['Sound insulation', 'Solid feel', 'Many finishes'], cons: ['Heavy'] },
                    { name: 'Solid Wood Door', price: '$500 – $1,200 each', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Genuine solid wood door. Unmatched quality, weight, and natural beauty.', pros: ['Natural wood', 'Premium feel', 'Lasts decades'], cons: ['Expensive', 'May warp'] }
                ],
                'Wallpaper': [
                    { name: 'Peel & Stick Vinyl', price: '$1 – $3 / sqft', durability: '★★★☆', design: '★★★☆', badge: 'value', desc: 'Removable peel-and-stick wallpaper. Perfect for renters and quick updates.', pros: ['Removable', 'DIY-friendly', 'Cheap'], cons: ['Can peel over time'] },
                    { name: 'Non-Woven Wallpaper', price: '$3 – $8 / sqft', durability: '★★★★', design: '★★★★', badge: 'best', desc: 'Breathable non-woven wallpaper. Easy to apply and remove cleanly.', pros: ['Breathable', 'Easy removal', 'Quality prints'], cons: ['Moderate cost'] },
                    { name: 'Designer / Import Wallpaper', price: '$10 – $30 / sqft', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'European or Japanese designer wallpaper. Unique textures and exclusive patterns.', pros: ['Exclusive designs', 'Luxury feel'], cons: ['Very expensive'] }
                ],
                'Countertop': [
                    { name: 'Laminate Countertop', price: '$10 – $25 / sqft', durability: '★★★☆', design: '★★★☆', badge: 'value', desc: 'Budget-friendly laminate countertop. Wide range of colors and patterns.', pros: ['Affordable', 'Many options', 'Easy install'], cons: ['Heat damage risk', 'Can chip'] },
                    { name: 'Quartz (Engineered Stone)', price: '$40 – $80 / sqft', durability: '★★★★★', design: '★★★★', badge: 'best', desc: 'Engineered quartz like Caesarstone or Silestone. Non-porous and virtually maintenance-free.', pros: ['Non-porous', 'Extremely durable', 'Stain-proof'], cons: ['Heavy', 'Not heat-proof'] },
                    { name: 'Natural Marble Slab', price: '$75 – $150 / sqft', durability: '★★★★', design: '★★★★★', badge: 'premium', desc: 'Natural marble countertop. The ultimate luxury kitchen statement.', pros: ['Natural beauty', 'Timeless luxury', 'Cool surface'], cons: ['Requires sealing', 'Stains easily'] }
                ],
                'Lighting': [
                    { name: 'Recessed LED Downlights', price: '$15 – $40 each', durability: '★★★★', design: '★★★☆', badge: 'value', desc: 'Clean, flush-mount LED downlights. Energy-efficient and unobtrusive.', pros: ['Energy saving', 'Clean look', 'Affordable'], cons: ['Limited ambiance'] },
                    { name: 'Cove Lighting + Pendant Combo', price: '$300 – $800 set', durability: '★★★★', design: '★★★★', badge: 'best', desc: 'Indirect cove lighting paired with statement pendants. Creates layered, warm ambiance.', pros: ['Mood lighting', 'Dimmable', 'Stylish'], cons: ['Professional install'] },
                    { name: 'Designer Pendant / Chandelier', price: '$500 – $3,000+ each', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Scandinavian or Italian designer lighting. A single fixture can define an entire room.', pros: ['Art piece', 'Statement maker'], cons: ['Very expensive'] }
                ],
                'Bathroom': [
                    { name: 'Standard Fixture Set', price: '$800 – $1,500 set', durability: '★★★☆', design: '★★★☆', badge: 'value', desc: 'Basic toilet, sink, and faucet set. Reliable domestic brands.', pros: ['Affordable', 'Easy warranty'], cons: ['Basic design'] },
                    { name: 'Mid-Range Fixture Set', price: '$1,500 – $3,500 set', durability: '★★★★', design: '★★★★', badge: 'best', desc: 'Premium-brand bathroom fixtures. Upgraded designs with better materials.', pros: ['Refined design', 'Durable', 'Good value'], cons: ['Moderate cost'] },
                    { name: 'Duravit / TOTO / Hansgrohe', price: '$4,000 – $10,000+ set', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Top-tier European/Japanese bathroom brands. Hotel-grade luxury for your home.', pros: ['World-class brands', 'Hotel quality'], cons: ['Very expensive'] }
                ],
                'Trim': [
                    { name: 'PVC Baseboard / Trim', price: '$0.50 – $2 / ft', durability: '★★★☆', design: '★★★☆', badge: 'value', desc: 'Basic PVC trim. Moisture-resistant and budget-friendly.', pros: ['Cheap', 'Water-resistant'], cons: ['Looks plastic'] },
                    { name: 'MDF Painted Trim', price: '$2 – $5 / ft', durability: '★★★★', design: '★★★★', badge: 'best', desc: 'Paintable MDF baseboard and crown molding. Clean lines and a professional finish.', pros: ['Paintable', 'Clean lines', 'Good value'], cons: ['Moisture sensitive'] },
                    { name: 'Solid Wood Trim', price: '$5 – $12 / ft', durability: '★★★★★', design: '★★★★★', badge: 'premium', desc: 'Hardwood trim and molding. Matches hardwood floors perfectly.', pros: ['Natural wood', 'Premium look'], cons: ['Expensive', 'Needs finishing'] }
                ]
            };
            return fallbacks[cat] || fallbacks['Doors'];
        }

        function updateProgress() {
            const el = document.getElementById('progress');
            el.innerHTML = '';
            for (let i = 1; i <= 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot' + (i <= currentStep ? ' done' : '');
                el.appendChild(dot);
            }
        }
        updateProgress();

        function selectCategory(card, cat) {
            data.category = cat;
            document.querySelectorAll('.category-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            setTimeout(() => { currentStep = 2; updateProgress(); showStep(2); }, 300);
        }

        function selectOpt(btn, key, val) {
            data[key] = val;
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            setTimeout(() => { currentStep++; updateProgress(); showStep(currentStep); }, 300);
        }

        function showStep(n) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            if (n <= 3) {
                document.getElementById('step' + n).classList.add('active');
            } else {
                showResults();
            }
        }

        function showResults() {
            const materials = getMaterials(data.category, data.style, data.budget);
            let html = `<div class="question">🪵 ${data.category} Recommendations — ${data.style} / ${data.budget}</div>`;
            html += '<div class="material-results">';

            materials.forEach(m => {
                html += `<div class="material-card">
                    <div class="material-header">
                        <div class="material-name">${m.name}</div>
                        <div class="material-badge badge-${m.badge}">${m.badge === 'best' ? '✨ BEST' : m.badge === 'premium' ? '👑 PREMIUM' : '💰 VALUE'}</div>
                    </div>
                    <div class="material-specs">
                        <div class="spec"><div class="spec-label">Price Range</div><div class="spec-value">${m.price}</div></div>
                        <div class="spec"><div class="spec-label">Durability</div><div class="spec-value">${m.durability}</div></div>
                        <div class="spec"><div class="spec-label">Design</div><div class="spec-value">${m.design}</div></div>
                    </div>
                    <div class="material-desc">${m.desc}</div>
                    <div class="material-pros">${m.pros.map(p => `<span>✅ ${p}</span>`).join('')}</div>
                    <div class="material-cons">${m.cons.map(c => `<span>⚠️ ${c}</span>`).join('')}</div>
                </div>`;
            });

            html += '</div>';
            html += `<div class="summary-box">
                <h3>💡 SmallTable Pro Tip</h3>
                <p style="color:#ccc;line-height:1.7">Always request physical samples before committing to any material.<br>
                Colors and textures look different in person vs. on screen.<br>
                SmallTable Design Group offers free material consultations and sample viewing.</p>
            </div>`;
            html += `<div class="disclaimer">⚠️ Prices are 2026 market averages and may vary based on quantity, location, and installation conditions.</div>`;
            html += `<div class="cta"><a href="https://open.kakao.com/o/s7h6q4Xf" target="_blank">📞 Free Material Consultation</a></div>`;
            html += `<div class="nav-buttons" style="margin-top:20px;justify-content:center"><button class="btn-back" onclick="location.reload()">🔄 Start Over</button></div>`;

            document.getElementById('result').innerHTML = html;
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
